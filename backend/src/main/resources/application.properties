spring.application.name=study-buddy-backend
spring.profiles.active=dev

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/studybuddy;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration (siehe CorsConfig)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

# Logging
logging.level.root=INFO
logging.level.com.studybuddy=DEBUG

# Server
server.port=8080
server.servlet.context-path=/

